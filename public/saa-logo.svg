<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 72 64" fill="none">
  <!-- Sun* brand mark: red square with asterisk star -->
  <rect x="0" y="0" width="32" height="32" rx="2" fill="#E8380D"/>
  <!-- Asterisk / star shape inside red square -->
  <line x1="16" y1="6" x2="16" y2="26" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="7" y1="11" x2="25" y2="21" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="7" y1="21" x2="25" y2="11" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
  <!-- "Sun*" label text -->
  <text x="36" y="11" font-family="Arial, sans-serif" font-weight="900" font-size="9" fill="white">Sun*</text>
  <!-- "Annual" -->
  <text x="36" y="22" font-family="Arial, sans-serif" font-size="7.5" fill="white">Annual</text>
  <!-- "Awards" -->
  <text x="36" y="32" font-family="Arial, sans-serif" font-size="7.5" fill="white">Awards</text>
  <!-- Year "2025" -->
  <text x="36" y="43" font-family="Arial, sans-serif" font-size="7" fill="white" opacity="0.8">2025</text>
</svg>
